name: CI Build for Docker Action
on: 
  push:
    branches: [ main ]
    paths: [ hello-world-docker-action/** ]
  workflow_dispatch:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3.3.0

      - name: Run my own container action
        id: hello-action
        uses: ./hello-world-docker-action
        with:
          who-to-greet: '@anotherRedbeard'

      - name: Run my own container action
        id: hello-action2
        uses: anotherRedbeard/hello-world-docker-action-2026@v1
        with:
          who-to-greet: '@anotherRedbeard'

      - name: Output time set in the container
        run: echo "The time was ${{ steps.hello-action.outputs.time }} when the action said hello"
      - name: Output time set in the container2
        run: echo "The time was ${{ steps.hello-action2.outputs.time }} when the action said hello"
